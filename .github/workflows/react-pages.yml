name: Build and Deploy React App

on:
  push:
    branches: [main]
    paths:
      - 'react-app/**'
      - '.github/workflows/react-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@