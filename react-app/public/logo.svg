<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">OpsDesk logo</title>
  <desc id="desc">Rounded blue square containing the letters OD.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c9cff"/>
      <stop offset="1" stop-color="#3157d5"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="30" fill="#101a2d"/>
  <rect x="12" y="12" width="104" height="104" rx="24" fill="url(#g)"/>
  <text x="64" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800" fill="white">OD</text>
</svg>
